# Template per deploy nativo. Sostituzioni eseguite da deploy-native.sh:
#   __FRONTEND_PORT__  <- FRONTEND_PORT (default 8080)
#   __DEPLOY_PATH__    <- DEPLOY_PATH (es. /home/deploy/workspace/dashboard-raspi)
#   __BACKEND_PORT__   <- BACKEND_PORT (default 8000)
server {
  listen __FRONTEND_PORT__;
  server_name _;
  root __DEPLOY_PATH__/current/frontend;
  index index.html;

  # Proxy WebSocket per la shell web (deve precedere /api/ per match piu' lungo).
  location /api/ws/ {
    proxy_pass http://127.0.0.1:__BACKEND_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600;
  }

  # Proxy REST API al backend.
  location /api/ {
    proxy_pass http://127.0.0.1:__BACKEND_PORT__;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}