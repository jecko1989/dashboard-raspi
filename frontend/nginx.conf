# Config nginx per SPA React (fallback su index.html per il routing client-side).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset statici con hash.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
